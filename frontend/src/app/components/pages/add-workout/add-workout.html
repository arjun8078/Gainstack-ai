

<!-- Main Content -->
<div class="ml-20 min-h-screen  p-8">

  <!-- Header -->
  <div class="max-w-4xl mx-auto mb-8">
    <h1 class="text-4xl font-bold text-white mb-2">Add New Workout 💪</h1>
    <p class="text-gray-400">Track your progress today</p>
  </div>

  <!-- Form Container -->
  <div class="max-w-4xl mx-auto">
    <form [formGroup]="workoutForm" (ngSubmit)="onSubmit()">

      <!-- Date & Duration Card -->
      <div class="bg-gray-900 rounded-2xl p-6 mb-6 border border-gray-800">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Date -->
          <div>
            <label class="block text-white font-medium mb-2">
              Date<span class="text-teal-400">*</span>
            </label>
            <input
              type="date"
              formControlName="date"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 transition-colors"
            />
          </div>

          <!-- Duration -->
          <div>
            <label class="block text-white font-medium mb-2">
              Duration (seconds)
            </label>
            <input
              type="number"
              formControlName="totalDuration"
              placeholder="0"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 transition-colors"
            />
          </div>

        </div>

        <!-- Notes -->
        <div class="mt-6">
          <label class="block text-white font-medium mb-2">Notes</label>
          <textarea
            formControlName="notes"
            rows="4"
            placeholder="Add any notes about your workout..."
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-teal-500 transition-colors resize-none"
          ></textarea>
        </div>
      </div>

      <!-- Exercises Section -->
      <div formArrayName="exercises" class="space-y-6">

        @for (exercise of exercises.controls; track $index) {
          <div [formGroupName]="$index" class="bg-gray-900 rounded-2xl p-6 border border-gray-800">

            <!-- Exercise Header -->
            <div class="flex items-center justify-between mb-6">
              <h3 class="text-xl font-bold text-white">Exercise {{ $index + 1 }}</h3>

              @if (exercises.length > 1) {
                <button
                  type="button"
                  (click)="removeExercise($index)"
                  class="p-2 text-gray-400 hover:text-red-400 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </button>
              }
            </div>

            <!-- Name & Category -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

              <!-- Name -->
              <div>
                <label class="block text-white font-medium mb-2">
                  Name<span class="text-teal-400">*</span>
                </label>
                <input
                  type="text"
                  formControlName="name"
                  placeholder="e.g., Bench Press"
                  class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-teal-500 transition-colors"
                />
              </div>

              <!-- Category -->
              <div>
                <label class="block text-white font-medium mb-2">
                  Category<span class="text-teal-400">*</span>
                </label>
                <select
                  formControlName="category"
                  class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 transition-colors appearance-none cursor-pointer">
                  <option value="Chest">Chest</option>
                  <option value="Back">Back</option>
                  <option value="Legs">Legs</option>
                  <option value="Shoulders">Shoulders</option>
                  <option value="Arms">Arms</option>
                  <option value="Core">Core</option>
                  <option value="Cardio">Cardio</option>
                  <option value="Other">Other</option>
                </select>
              </div>

            </div>

            <!-- Sets -->
            <div class="mb-4">
              <h4 class="text-white font-medium mb-3">Sets:</h4>

              <div formArrayName="sets" class="space-y-3">
                @for (set of getSets($index).controls; track setIndex; let setIndex = $index) {
                  <div [formGroupName]="setIndex" class="grid grid-cols-2 md:grid-cols-3 gap-4">

                    <!-- Reps -->
                    <div>
                      <label class="block text-gray-400 text-sm mb-1">
                        Reps<span class="text-teal-400">*</span>
                      </label>
                      <input
                        type="number"
                        formControlName="reps"
                        placeholder="10"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-500 transition-colors"
                      />
                    </div>

                    <!-- Weight -->
                    <div>
                      <label class="block text-gray-400 text-sm mb-1">
                        Weight (kg)<span class="text-teal-400">*</span>
                      </label>
                      <input
                        type="number"
                        formControlName="weight"
                        placeholder="0"
                        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-500 transition-colors"
                      />
                    </div>

                    <!-- Delete Set Button -->
                    <div class="flex items-end">
                      @if (getSets($index).length > 1) {
                        <button
                          type="button"
                          (click)="removeSet($index, setIndex)"
                          class="p-2 text-gray-400 hover:text-red-400 transition-colors">
                          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                          </svg>
                        </button>
                      }
                    </div>

                  </div>
                }
              </div>

              <!-- Add Set Button -->
              <button
                type="button"
                (click)="addSet($index)"
                class="mt-4 w-full py-3 border-2 border-dashed border-gray-700 rounded-xl text-teal-400 hover:border-teal-500 hover:bg-teal-500/5 transition-all flex items-center justify-center gap-2 font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Add Set
              </button>
            </div>

          </div>
        }

      </div>

      <!-- Add Exercise Button -->
      <button
        type="button"
        (click)="addExercise()"
        class="mt-6 w-full py-4 border-2 border-dashed border-gray-700 rounded-xl text-teal-400 hover:border-teal-500 hover:bg-teal-500/5 transition-all flex items-center justify-center gap-2 font-semibold text-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Exercise
      </button>

      <!-- Action Buttons -->
      <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">

        <!-- Cancel -->
        <button
          type="button"
          (click)="cancel()"
          class="py-4 bg-gray-800 text-white rounded-xl font-semibold hover:bg-gray-700 transition-colors">
          Cancel
        </button>

        <!-- Save -->
        <button
          type="submit"
          [disabled]="!workoutForm.valid || isLoading()"
          class="py-4 bg-gradient-to-r from-teal-500 to-emerald-500 text-white rounded-xl font-semibold hover:shadow-lg hover:scale-105 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
          @if (isLoading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Saving...
            </span>
          } @else {
            Save Workout
          }
        </button>

      </div>

    </form>
  </div>

</div>
