<aside class="fixed left-0 top-0 h-dvh w-20 bg-gradient-to-b from-gray-950 to-gray-900 flex flex-col items-center py-4 shadow-2xl z-50">

      <!-- Logo -->
      <div class="mb-8">
        <div class="w-12 h-12 bg-gradient-to-br from-teal-500 to-emerald-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
          💪
        </div>
      </div>

      <!-- Navigation Icons -->
      <nav class="flex-1 flex flex-col gap-4">

        <!-- Dashboard -->
        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          class="nav-icon group"
          title="Dashboard">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1H5a1 1 0 01-1-1v-3zM14 16a1 1 0 011-1h4a1 1 0 011 1v3a1 1 0 01-1 1h-4a1 1 0 01-1-1v-3z"/>
          </svg>
          <span class="tooltip">Dashboard</span>
        </a>

        <!-- Workouts -->
        <a
          routerLink="/workouts"
          routerLinkActive="active"
          class="nav-icon group"
          title="Workouts">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span class="tooltip">Workouts</span>
        </a>

        <!-- Add Workout -->
        <a
          routerLink="/add-workout"
          routerLinkActive="active"
          class="nav-icon group"
          title="Add Workout">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          <span class="tooltip">Add Workout</span>
        </a>

        <!-- AI Chat -->
        <a
          routerLink="/ai-chat"
          routerLinkActive="active"
          class="nav-icon group"
          title="AI Coach">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
          </svg>
          <span class="tooltip">AI Coach</span>
        </a>

      </nav>

      <!-- Bottom Icons -->
      <div class="flex flex-col gap-4 mb-6">

        <!-- Notifications -->
        <button class="nav-icon group relative" title="Notifications">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
          <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full"></span>
          <span class="tooltip">Notifications</span>
        </button>

        <!-- Settings -->
        <button class="nav-icon group" title="Settings">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="tooltip">Settings</span>
        </button>

        <!-- User Profile -->
        <button
          (click)="toggleUserMenu()"
          class="w-12 h-12 rounded-full bg-gradient-to-br from-teal-400 to-emerald-400 flex items-center justify-center text-white font-semibold text-sm shadow-lg hover:shadow-xl transition-all cursor-pointer">
          {{ userInitials() }}
        </button>

        <!-- User Menu Dropdown -->
        @if (showUserMenu) {
          <div class="absolute bottom-20 left-24 bg-white rounded-lg shadow-2xl py-2 w-48 animate-fadeIn">
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="font-semibold text-gray-800">{{ userName() }}</p>
              <p class="text-xs text-gray-500 truncate">{{ userEmail() }}</p>
            </div>
            <button
              (click)="logout()"
              class="w-full px-4 py-2 text-left text-red-600 hover:bg-red-50 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Logout
            </button>
          </div>
        }

      </div>
    </aside>
